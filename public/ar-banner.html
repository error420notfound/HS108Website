<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --surface-base: #FFE1D8;
        --black-native: #120600;
        --orange-500: #ED582A;
        --text-on-dark: #FFE1D8;
        --font-mono: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
        --font-display: "Instrument Serif", serif;
        --size-label: 11px;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }

      body {
        font-family: var(--font-mono);
        color: var(--black-native);
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: var(--text-on-dark);
        }
      }

      .banner-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        box-sizing: border-box;
        background: rgba(255, 225, 216, 0.02);
      }

      .banner-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .banner-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        stroke: currentColor;
        stroke-width: 1.5;
      }

      .banner-text {
        line-height: 1.3;
      }

      .banner-title {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin: 0;
      }

      .banner-subtitle {
        font-size: 11px;
        opacity: 0.6;
        letter-spacing: 0.03em;
        margin: 2px 0 0 0;
      }

      .banner-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border: 2px solid var(--black-native);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .banner-cta:hover {
        background: var(--orange-500);
        border-color: var(--orange-500);
      }

      @media (prefers-color-scheme: dark) {
        .banner-cta {
          border-color: var(--text-on-dark);
        }
        .banner-cta:hover {
          background: var(--orange-500);
          border-color: var(--orange-500);
        }
      }

      .banner-arrow {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
      }
    </style>
  </head>

  <body>
    <div class="banner-container">
      <!-- Left: Icon + Text -->
      <div class="banner-left">
        <!-- Cube/Model Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="banner-icon"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 16.5V7.5L12 3 3 7.5v9L12 21l9-4.5z"
          />
        </svg>

        <div class="banner-text">
          <p class="banner-title">NovaPay Brand</p>
          <p class="banner-subtitle">View in your space</p>
        </div>
      </div>

      <!-- Right: CTA Button -->
      <button class="banner-cta" type="button" aria-label="View in AR">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="banner-arrow"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 5l7 7-7 7"
          />
        </svg>
      </button>
    </div>
  </body>
</html>
